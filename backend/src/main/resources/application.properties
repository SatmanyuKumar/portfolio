server.port=${PORT:8080}

# Postgres (Neon in production, or local Postgres if you run one — set env vars when deploying)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:1111/portfolio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Groq (OpenAI-compatible) — never hardcode the key, always read from env
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.chat.options.temperature=0.0













